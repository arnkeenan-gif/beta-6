<script>
const CONFIG = {
  ETHERSCAN_KEY:'YCNIYTGQQ666ICG3R1IKTRVH7NRCWFHYSV',
  REDIRECT_URL:'confirmation.html',
  POLL_MS:2500,
  REDIRECT_SECS:5
};

const SOL_HTTP_RPC = 'https://api.mainnet-beta.solana.com';
const SOL_WS_RPC = 'wss://api.mainnet-beta.solana.com';

const currencies = {
  btc:  {ticker:'BTC', name:'Bitcoin',  network:'Bitcoin Network',            addr:'bc1q7n3vqfsy0sm8res9vltk8zcdd996ux5gdp2jfx',  logo:'https://cdn.jsdelivr.net/gh/spothq/cryptocurrency-icons@master/128/color/btc.png',  explorer:tx=>`https://mempool.space/tx/${tx}`},
  eth:  {ticker:'ETH', name:'Ethereum', network:'Ethereum Network (ERC-20)',  addr:'0xe8153fd51A3F7d52a2A8cC84A9523E195E17F5A7',  logo:'https://cdn.jsdelivr.net/gh/spothq/cryptocurrency-icons@master/128/color/eth.png',  explorer:tx=>`https://etherscan.io/tx/${tx}`},
  sol:  {ticker:'SOL', name:'Solana',   network:'Solana Network',             addr:'5mcfJ1ZSvhypqt4EpMFPHkte5brgMQYLbnN6yXNRgWGb',logo:'https://cdn.jsdelivr.net/gh/spothq/cryptocurrency-icons@master/128/color/sol.png',  explorer:tx=>`https://solscan.io/tx/${tx}`},
  usdc: {ticker:'USDC',name:'USD Coin', network:'Solana Network (SPL Token)', addr:'5mcfJ1ZSvhypqt4EpMFPHkte5brgMQYLbnN6yXNRgWGb',logo:'https://cdn.jsdelivr.net/gh/spothq/cryptocurrency-icons@master/128/color/usdc.png', explorer:tx=>`https://solscan.io/tx/${tx}`},
};

const cart         = JSON.parse(localStorage.getItem('rp_cart')||'[]');
const shipping     = JSON.parse(sessionStorage.getItem('rp_shipping')||'{}');
const shipMethod   = JSON.parse(sessionStorage.getItem('rp_shipping_method')||'{}');

const shipPrice    = shipMethod.price || 6.99;
const gbpTotal     = subtotal + shipPrice;

let rates={}, cryptoAmounts={};
let currentKey=null,pollTimer=null,seenTxids=new Set(),pollCount=0,sessionStart=0,currentAddr='';
let tickTimer=null;

let solBaselineLamports = null;
let solLastLamports = null;
let solBaselineSignature = null;
let solWs = null;
let solWsSubId = null;
let solReady = false;
let solPaymentFound = false;

/* Strip */
(function renderStrip(){

  document.getElementById('stripSubtotal').textContent='£'+subtotal.toFixed(2);
  document.getElementById('stripShippingPrice').textContent='£'+shipPrice.toFixed(2);
  if(shipMethod.label){
    document.getElementById('stripShippingLabel').innerHTML=`
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px">
        ${shipMethod.key==='express'?'<path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>':'<path d="M20 7H4a2 2 0 00-2 2v6a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/>'}
      </svg>
      ${shipMethod.label}`;
  }
  const items=document.getElementById('cartStripItems');
  items.innerHTML=cart.map(i=>`<div class="cart-strip-item"><span>${i.name} ${i.dose}</span><span class="cart-strip-item-qty">×${i.qty}</span><span class="cart-strip-item-price">£${(i.price*i.qty).toFixed(2)}</span></div>`).join('');
})();

/* Rates */
async function fetchRates(){
  try{
    const res=await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana,usd-coin&vs_currencies=gbp');
    const d=await res.json();
    rates={btc:d.bitcoin?.gbp||0,eth:d.ethereum?.gbp||0,sol:d.solana?.gbp||0,usdc:d['usd-coin']?.gbp||0.79};
    if(gbpTotal>0&&rates.btc>0){
      cryptoAmounts={
        btc: (gbpTotal/rates.btc).toFixed(6),
        eth: (gbpTotal/rates.eth).toFixed(5),
        sol: (gbpTotal/rates.sol).toFixed(3),
        usdc:(gbpTotal/rates.usdc).toFixed(2),
      };
      document.getElementById('amt-btc').textContent =cryptoAmounts.btc +' BTC';
      document.getElementById('amt-eth').textContent =cryptoAmounts.eth +' ETH';
      document.getElementById('amt-sol').textContent =cryptoAmounts.sol +' SOL';
      document.getElementById('amt-usdc').textContent=cryptoAmounts.usdc+' USDC';
      document.getElementById('conv-note').textContent='Live rates · Includes shipping · Refresh for latest';
    }
  }catch(e){
    document.getElementById('conv-note').textContent='Could not load live rates';
    console.error('Rate load failed', e);
  }
}
fetchRates();

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function setTracker(state,html){
  document.getElementById('tracker-dot').className='tracker-dot'+(state==='scanning'?' scanning':state==='found'?' found':'');
  document.getElementById('tracker-text').innerHTML=html;
}

async function solRpc(method, params){
  const res = await fetch(SOL_HTTP_RPC, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({jsonrpc:'2.0', id:1, method, params})
  });

  if(!res.ok){
    throw new Error(`Solana RPC HTTP ${res.status}`);
  }

  const data = await res.json();
  if(data.error){
    throw new Error(data.error.message || 'Solana RPC error');
  }
  return data.result;
}

async function getSolBalanceLamports(addr){
  const result = await solRpc('getBalance', [addr, { commitment:'confirmed' }]);
  return Number(result?.value || 0);
}

async function getLatestSignature(addr){
  const result = await solRpc('getSignaturesForAddress', [addr, { limit:1 }]);
  if(Array.isArray(result) && result.length && result[0]?.signature){
    return result[0].signature;
  }
  return null;
}

async function prepareSolWatcher(){
  solPaymentFound = false;
  solReady = false;
  solBaselineLamports = await getSolBalanceLamports(currencies.sol.addr);
  solLastLamports = solBaselineLamports;
  solBaselineSignature = await getLatestSignature(currencies.sol.addr);
  connectSolWebSocket();
  solReady = true;
  console.log('SOL watcher ready', {
    baselineLamports: solBaselineLamports,
    baselineSignature: solBaselineSignature
  });
}

function connectSolWebSocket(){
  closeSolWebSocket();

  try{
    solWs = new WebSocket(SOL_WS_RPC);

    solWs.onopen = () => {
      solWs.send(JSON.stringify({
        jsonrpc:'2.0',
        id:1001,
        method:'accountSubscribe',
        params:[
          currencies.sol.addr,
          { commitment:'confirmed', encoding:'jsonParsed' }
        ]
      }));
    };

    solWs.onmessage = async (event) => {
      try{
        const msg = JSON.parse(event.data);

        if(msg.id === 1001 && typeof msg.result === 'number'){
          solWsSubId = msg.result;
          return;
        }

        if(msg.method === 'accountNotification' && currentKey === 'sol' && !solPaymentFound && solReady){
          const lamports = Number(msg.params?.result?.value?.lamports || 0);
          console.log('SOL account notification lamports', lamports);

          if(lamports > solLastLamports){
            const diff = lamports - solLastLamports;
            solLastLamports = lamports;
            solPaymentFound = true;
            onPaymentFound({
              txid:'Balance change detected',
              amount:`${(diff/1e9).toFixed(6)} SOL`,
              explorer:`https://solscan.io/account/${currencies.sol.addr}`
            });
          } else {
            solLastLamports = lamports;
          }
        }
      }catch(err){
        console.error('WS parse error', err);
      }
    };

    solWs.onerror = (err) => {
      console.error('SOL websocket error', err);
    };

    solWs.onclose = () => {
      solWsSubId = null;
      if(currentKey === 'sol' && !solPaymentFound){
        setTimeout(() => {
          if(currentKey === 'sol' && !solPaymentFound){
            connectSolWebSocket();
          }
        }, 1500);
      }
    };
  }catch(err){
    console.error('WS connection failed', err);
  }
}

function closeSolWebSocket(){
  try{
    if(solWs && solWs.readyState === WebSocket.OPEN && solWsSubId !== null){
      solWs.send(JSON.stringify({
        jsonrpc:'2.0',
        id:1002,
        method:'accountUnsubscribe',
        params:[solWsSubId]
      }));
    }
  }catch(e){}

  try{
    if(solWs) solWs.close();
  }catch(e){}

  solWs = null;
  solWsSubId = null;
}

async function openPayment(key){
  const c=currencies[key];
  currentKey=key;
  currentAddr=c.addr;
  sessionStart=Math.floor(Date.now()/1000);
  seenTxids.clear();
  pollCount=0;

  document.getElementById('pay-logo-img').src=c.logo;
  document.getElementById('pay-logo-img').alt=c.ticker;
  document.getElementById('pay-label').textContent=c.name+' ('+c.ticker+')';
  document.getElementById('pay-network').textContent=c.network;
  document.getElementById('addr-display').textContent=c.addr;

  const camt=cryptoAmounts[key]||'?';
  document.getElementById('pay-crypto-amount').textContent=camt;
  document.getElementById('pay-crypto-ticker').textContent=c.ticker;
  document.getElementById('pay-gbp-label').textContent='£'+gbpTotal.toFixed(2)+' GBP (incl. shipping)';
  document.getElementById('warn-text').innerHTML='⚠ Send exactly <strong>'+camt+' '+c.ticker+'</strong> to this address. Only send <strong>'+c.ticker+'</strong> — wrong assets result in permanent loss.';

  const btn=document.getElementById('copy-btn');
  btn.textContent='Copy';
  btn.className='copy-btn';

  document.getElementById('qr-output').innerHTML='';
  new QRCode(document.getElementById('qr-output'),{
    text:c.addr,
    width:142,
    height:142,
    colorDark:'#000000',
    colorLight:'#ffffff',
    correctLevel:QRCode.CorrectLevel.M
  });

  sessionStorage.setItem('rp_order',JSON.stringify({
    cart,shipping,shipMethod,subtotal,shipPrice,gbpTotal,cryptoKey:key,cryptoAmount:camt,cryptoTicker:c.ticker
  }));

  if(key === 'sol'){
    setTracker('scanning','<strong>Preparing Solana scanner…</strong><br>Setting secure starting balance');
    showScreen('screen-pay');
    try{
      await prepareSolWatcher();
      setTracker('scanning','<strong>Scanning blockchain…</strong><br>Waiting for your transaction to be detected');
    }catch(err){
      console.error('prepareSolWatcher failed', err);
      setTracker('scanning','<strong>Scanner startup issue…</strong><br>Retrying with RPC polling');
    }
  }else{
    setTracker('scanning','<strong>Scanning blockchain…</strong><br>Waiting for your transaction to be detected');
    showScreen('screen-pay');
  }

  startPolling();
}

function copyAddress(){
  navigator.clipboard.writeText(currentAddr).then(()=>{
    const btn=document.getElementById('copy-btn');
    btn.textContent='Copied!';
    btn.className='copy-btn ok';
    setTimeout(()=>{btn.textContent='Copy';btn.className='copy-btn';},2400);
  });
}

function stopAndGoBack(){
  stopPolling();
  showScreen('screen-select');
}

function startPolling(){
  stopPolling();
  tickTimer=setInterval(updateTimerDisplay,1000);
  poll();
  pollTimer=setInterval(poll,CONFIG.POLL_MS);
}

function stopPolling(){
  if(pollTimer){clearInterval(pollTimer);pollTimer=null;}
  if(tickTimer){clearInterval(tickTimer);tickTimer=null;}
  closeSolWebSocket();
}

function updateTimerDisplay(){
  if(!sessionStart) return;
  const elapsed=Math.floor(Date.now()/1000-sessionStart);
  const mins=Math.floor(elapsed/60),secs=elapsed%60;
  const timeStr=(mins>0?mins+'m ':'')+secs+'s';
  setTracker('scanning',`<strong>Scanning blockchain…</strong><br>Monitoring for ${timeStr} · Check #${pollCount} · Next check in ${CONFIG.POLL_MS/1000}s`);
}

async function poll(){
  pollCount++;
  updateTimerDisplay();
  try{
    let r=null;
    if(currentKey==='btc') r=await checkBTC();
    else if(currentKey==='eth') r=await checkETH();
    else if(currentKey==='sol') r=await checkSOL();
    else r=await checkSOL();

    if(r && !solPaymentFound){
      solPaymentFound = true;
      onPaymentFound(r);
    }
  }catch(e){
    console.error(e);
    setTracker('scanning',`<strong>Scanning blockchain…</strong><br>Network hiccup — retrying in ${CONFIG.POLL_MS/1000}s`);
  }
}

async function checkBTC(){
  const addr=currencies.btc.addr,base='https://mempool.space/api';
  const[mRes,cRes]=await Promise.all([fetch(`${base}/address/${addr}/txs/mempool`),fetch(`${base}/address/${addr}/txs`)]);
  const all=[...(mRes.ok?await mRes.json():[]),...(cRes.ok?await cRes.json():[])];
  for(const tx of all){
    if(seenTxids.has(tx.txid))continue;
    const recv=(tx.vout||[]).filter(o=>o.scriptpubkey_address===addr);
    if(!recv.length)continue;
    const t=tx.status?.block_time||0;
    if(t>0&&t<sessionStart)continue;
    seenTxids.add(tx.txid);
    const btc=(recv.reduce((s,o)=>s+(o.value||0),0)/1e8).toFixed(8);
    return{txid:tx.txid,amount:`${btc} BTC (${tx.status?.confirmed?'confirmed':'unconfirmed'})`,explorer:currencies.btc.explorer(tx.txid)};
  }
  return null;
}

async function checkETH(){
  const addr=currencies.eth.addr;
  const res=await fetch(`https://api.etherscan.io/api?module=account&action=txlist&address=${addr}&startblock=0&endblock=99999999&sort=desc&apikey=${CONFIG.ETHERSCAN_KEY}`);
  if(!res.ok)throw new Error('Etherscan');
  const d=await res.json();
  if(d.status!=='1'||!Array.isArray(d.result))return null;
  for(const tx of d.result){
    if(seenTxids.has(tx.hash))continue;
    if(parseInt(tx.timeStamp,10)<sessionStart)break;
    if(!tx.to||tx.to.toLowerCase()!==addr.toLowerCase())continue;
    if(tx.isError==='1')continue;
    seenTxids.add(tx.hash);
    return{txid:tx.hash,amount:`${(parseInt(tx.value,10)/1e18).toFixed(6)} ETH`,explorer:currencies.eth.explorer(tx.hash)};
  }
  return null;
}

async function checkSOL(){
  const addr = currencies.sol.addr;

  if(currentKey !== 'sol') return null;

  const currentBalance = await getSolBalanceLamports(addr);

  if(solBaselineLamports === null){
    solBaselineLamports = currentBalance;
    solLastLamports = currentBalance;
    return null;
  }

  if(currentBalance > solLastLamports){
    const diff = currentBalance - solLastLamports;
    solLastLamports = currentBalance;
    console.log('SOL balance increase detected', diff);
    return {
      txid:'Balance change detected',
      amount:`${(diff/1e9).toFixed(6)} SOL`,
      explorer:`https://solscan.io/account/${addr}`
    };
  }

  solLastLamports = currentBalance;

  const sigs = await solRpc('getSignaturesForAddress', [addr, { limit:10 }]);
  if(!Array.isArray(sigs) || !sigs.length) return null;

  for(const sig of sigs){
    if(!sig?.signature) continue;
    if(sig.signature === solBaselineSignature) break;
    if(seenTxids.has(sig.signature) || sig.err) continue;

    const tx = await solRpc('getTransaction', [
      sig.signature,
      { encoding:'jsonParsed', commitment:'confirmed', maxSupportedTransactionVersion:0 }
    ]);

    if(!tx) continue;

    const allIx = [
      ...(tx.transaction?.message?.instructions || []),
      ...(tx.meta?.innerInstructions || []).flatMap(g=>g.instructions || [])
    ];

    for(const ix of allIx){
      if(
        ix?.program === 'system' &&
        ix?.parsed?.type === 'transfer' &&
        ix?.parsed?.info?.destination === addr
      ){
        const lamports = Number(ix.parsed.info?.lamports || 0);
        if(lamports > 0){
          seenTxids.add(sig.signature);
          console.log('SOL parsed transfer detected', sig.signature, lamports);
          return {
            txid:sig.signature,
            amount:`${(lamports/1e9).toFixed(6)} SOL`,
            explorer:currencies.sol.explorer(sig.signature)
          };
        }
      }
    }

    const keys = tx.transaction?.message?.accountKeys || [];
    const idx = keys.findIndex(k => (k.pubkey || k) === addr);
    if(idx >= 0){
      const pre = Number(tx.meta?.preBalances?.[idx] ?? 0);
      const post = Number(tx.meta?.postBalances?.[idx] ?? 0);
      const diff = post - pre;
      if(diff > 0){
        seenTxids.add(sig.signature);
        console.log('SOL balance diff in tx detected', sig.signature, diff);
        return {
          txid:sig.signature,
          amount:`${(diff/1e9).toFixed(6)} SOL`,
          explorer:currencies.sol.explorer(sig.signature)
        };
      }
    }
  }

  return null;
}

function onPaymentFound(result){
  stopPolling();
  const order=JSON.parse(sessionStorage.getItem('rp_order')||'{}');
  order.txid=result.txid;
  order.txAmount=result.amount;
  order.explorerUrl=result.explorer;
  sessionStorage.setItem('rp_order',JSON.stringify(order));
  document.getElementById('success-sub').textContent=result.amount+' received. Your order is being processed.';
  document.getElementById('success-txid').textContent=result.txid;
  document.getElementById('explorer-link').href=result.explorer;
  showScreen('screen-success');
  startCountdown();
}

function startCountdown(){
  let n=CONFIG.REDIRECT_SECS;
  document.getElementById('redirect-count').textContent=n;
  const t=setInterval(()=>{
    n--;
    document.getElementById('redirect-count').textContent=n;
    if(n<=0){
      clearInterval(t);
      window.location.href=CONFIG.REDIRECT_URL;
    }
  },1000);
}

/* Waves */
const wc=document.getElementById('wave-canvas'),wctx=wc.getContext('2d');let frame=0;
function resize(){wc.width=window.innerWidth;wc.height=window.innerHeight;}resize();window.addEventListener('resize',resize);
const S=0.000065;
const waves=[
  {yF:.20,amp:28,f1:.0045,s1:S*1.0, f2:.0072,s2:S*.75,color:'rgba(37,99,235,0.09)', lw:1.5},
  {yF:.35,amp:18,f1:.006, s1:S*1.25,f2:.0095,s2:S*.95,color:'rgba(37,99,235,0.06)', lw:1.0},
  {yF:.50,amp:36,f1:.0035,s1:S*.8,  f2:.0055,s2:S*.6, color:'rgba(110,50,240,0.07)',lw:1.5},
  {yF:.63,amp:22,f1:.007, s1:S*1.1, f2:.011, s2:S*.85,color:'rgba(110,50,240,0.05)',lw:1.0},
  {yF:.77,amp:30,f1:.005, s1:S*.85, f2:.008, s2:S*.65,color:'rgba(37,99,235,0.055)',lw:1.0},
  {yF:.90,amp:15,f1:.008, s1:S*1.15,f2:.013, s2:S*.9, color:'rgba(37,99,235,0.038)',lw:0.8},
];
function drawWaves(){
  wctx.clearRect(0,0,wc.width,wc.height);
  const W=wc.width,H=wc.height,f=frame;
  waves.forEach(w=>{wctx.beginPath();wctx.strokeStyle=w.color;wctx.lineWidth=w.lw;for(let x=0;x<=W;x+=3){const y=H*w.yF+Math.sin(x*w.f1+f*w.s1*1000)*w.amp+Math.sin(x*w.f2+f*w.s2*1000)*w.amp*.28;x===0?wctx.moveTo(x,y):wctx.lineTo(x,y);}wctx.stroke();});
  frame++;requestAnimationFrame(drawWaves);
}
drawWaves();
</script>
